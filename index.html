<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Obsyd — Plataforma de organização financeira</title>
  <meta name="description" content="Obsyd é uma plataforma de organização financeira com autenticação real, relatórios, metas, orçamento e persistência individual." />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            slateDeep: '#050816',
            emeraldGlow: '#1f8a70',
            coralGlow: '#b85c6e',
            electricViolet: '#4f46b5',
            luxury: '#c6cfdf'
          },
          boxShadow: {
            glass: '0 20px 50px rgba(2, 6, 23, 0.46)',
            soft: '0 10px 30px rgba(2, 6, 23, 0.34)',
            glow: '0 0 0 1px rgba(255,255,255,.06), 0 24px 54px rgba(2,6,23,.42)'
          }
        }
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="./assets/css/styles.css" />
</head>
<body class="bg-slateDeep text-slate-100 antialiased selection:bg-indigo-500/30 selection:text-white">
  <div class="pointer-events-none fixed inset-0 opacity-80">
    <div class="absolute inset-0 bg-grid-pattern"></div>
    <div class="absolute -left-24 top-0 h-80 w-80 rounded-full bg-teal-900/40 blur-3xl"></div>
    <div class="absolute right-0 top-12 h-72 w-72 rounded-full bg-indigo-950/70 blur-3xl"></div>
    <div class="absolute bottom-0 left-1/3 h-72 w-72 rounded-full bg-rose-950/60 blur-3xl"></div>
  </div>

  <div id="app" class="relative min-h-screen"></div>

  <script defer src="./assets/js/app.js"></script>
</body>
</html>
